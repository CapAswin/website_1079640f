<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Opulent Influencer House</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    <style>
        :root{
            --bg-1:#07111a;
            --bg-2:#0c1c2c;
            --surface:rgba(10,22,35,.72);
            --surface-2:rgba(255,255,255,.06);
            --line:rgba(255,255,255,.1);
            --text:#f6f8fb;
            --muted:rgba(233,238,245,.72);
            --gold:#d8a85a;
            --gold-2:#f3cf86;
            --cyan:rgba(94,219,255,.24);
            --shadow:0 28px 90px rgba(0,0,0,.34);
        }
        *{box-sizing:border-box}
        html,body{margin:0;padding:0;min-height:100%}
        body{
            font-family:Arial,Helvetica,sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at 15% 18%, rgba(216,168,90,.18), transparent 28%),
                radial-gradient(circle at 84% 22%, rgba(94,219,255,.18), transparent 26%),
                linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 55%, #081019 100%);
            overflow-x:hidden;
        }
        .coming-page{
            min-height:100vh;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            overflow:hidden;
        }
        .coming-page::before,
        .coming-page::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(12px);
            pointer-events:none;
        }
        .coming-page::before{
            width:320px;
            height:320px;
            left:-80px;
            top:8%;
            background:radial-gradient(circle, rgba(216,168,90,.28) 0%, rgba(216,168,90,0) 70%);
            animation:floatSoft 12s ease-in-out infinite;
        }
        .coming-page::after{
            width:380px;
            height:380px;
            right:-120px;
            bottom:2%;
            background:radial-gradient(circle, rgba(94,219,255,.2) 0%, rgba(94,219,255,0) 72%);
            animation:floatSoft 14s ease-in-out infinite reverse;
        }
        .mesh{
            position:absolute;
            inset:-20%;
            background-image:
                linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size:72px 72px;
            mask-image:radial-gradient(circle at center, #000 28%, transparent 74%);
            transform:perspective(1200px) rotateX(72deg) translateY(22%);
            opacity:.36;
            pointer-events:none;
        }
        .coming-card{
            position:relative;
            z-index:1;
            width:min(760px,100%);
            padding:34px;
            border-radius:34px;
            background:var(--surface);
            border:1px solid var(--line);
            backdrop-filter:blur(22px);
            box-shadow:var(--shadow);
            text-align:center;
        }
        .coming-card::before{
            content:"";
            position:absolute;
            inset:auto -60px -70px auto;
            width:220px;
            height:220px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(216,168,90,.12), rgba(216,168,90,0) 70%);
            pointer-events:none;
        }
        .brand-mark{
            margin-bottom:28px;
        }
        .brand-mark img{
            width:272px;
            height:272px;
            object-fit:contain;
            filter:drop-shadow(0 10px 28px rgba(0,0,0,.26));
        }
        .eyebrow{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:8px 14px;
            border-radius:999px;
            background:rgba(216,168,90,.14);
            border:1px solid rgba(216,168,90,.22);
            color:var(--gold-2);
            font-size:12px;
            letter-spacing:.16em;
            text-transform:uppercase;
        }
        h1{
            margin:18px auto 10px;
            max-width:11ch;
            font-size:clamp(30px,8vw,62px);
            line-height:.96;
            letter-spacing:-.05em;
        }
        .subcopy{
            margin:0 auto 24px;
            max-width:500px;
            color:var(--muted);
            font-size:16px;
            line-height:1.8;
        }
        .trigger{
            appearance:none;
            border:none;
            cursor:pointer;
            min-height:56px;
            padding:0 26px;
            border-radius:999px;
            background:linear-gradient(135deg, var(--gold-2) 0%, var(--gold) 100%);
            color:#08111b;
            font-weight:700;
            font-size:15px;
            box-shadow:0 18px 40px rgba(216,168,90,.24);
            transition:transform .35s ease, box-shadow .35s ease;
        }
        .trigger:hover{transform:translateY(-2px)}
        .contact-wrap{
            display:grid;
            grid-template-rows:0fr;
            opacity:0;
            transform:translateY(16px);
            transition:grid-template-rows .6s cubic-bezier(.22,1,.36,1), opacity .42s ease, transform .6s cubic-bezier(.22,1,.36,1), margin-top .4s ease;
            margin-top:0;
            text-align:left;
        }
        .contact-wrap.is-open{
            grid-template-rows:1fr;
            opacity:1;
            transform:translateY(0);
            margin-top:22px;
        }
        .contact-inner{
            overflow:hidden;
        }
        .contact-form{
            padding:20px;
            border-radius:24px;
            background:var(--surface-2);
            border:1px solid rgba(255,255,255,.08);
            display:grid;
            gap:12px;
        }
        .field{
            display:grid;
            gap:8px;
        }
        .field label{
            font-size:12px;
            font-weight:700;
            letter-spacing:.08em;
            text-transform:uppercase;
            color:rgba(255,255,255,.7);
        }
        .field input,.field textarea{
            width:100%;
            border:none;
            outline:none;
            padding:15px 16px;
            border-radius:16px;
            background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.08);
            color:var(--text);
            transition:border-color .35s ease, background .35s ease, transform .35s ease;
        }
        .field input:focus,.field textarea:focus{
            border-color:rgba(216,168,90,.5);
            background:rgba(255,255,255,.1);
            transform:translateY(-1px);
        }
        .field textarea{
            min-height:120px;
            resize:vertical;
        }
        .submit-row{
            display:flex;
            justify-content:flex-end;
        }
        .form-status{
            display:none;
            margin-top:12px;
            padding:13px 14px;
            border-radius:16px;
            font-size:14px;
            line-height:1.7;
        }
        .form-status.is-visible{display:block}
        .form-status.is-success{
            background:rgba(96, 226, 173, .12);
            border:1px solid rgba(96, 226, 173, .24);
            color:#dff8ed;
        }
        .form-status.is-error{
            background:rgba(255, 109, 109, .12);
            border:1px solid rgba(255, 109, 109, .22);
            color:#ffd7d7;
        }
        .submit-btn{
            appearance:none;
            border:none;
            cursor:pointer;
            min-height:50px;
            padding:0 20px;
            border-radius:999px;
            background:#f5f7fb;
            color:#07111a;
            font-weight:700;
            transition:transform .35s ease, opacity .35s ease;
        }
        .submit-btn:hover{transform:translateY(-1px)}
        @keyframes floatSoft{
            0%,100%{transform:translate3d(0,0,0)}
            50%{transform:translate3d(0,-18px,0)}
        }
        @media (max-width:767px){
            .coming-page{padding:16px}
            .coming-card{padding:24px 18px;border-radius:26px}
            .brand-mark{margin-bottom:22px}
            .brand-mark img{width:94px;height:94px}
            .contact-form{padding:16px}
        }
    </style>
</head>
<body>
    <main class="coming-page">
        <div class="mesh" aria-hidden="true"></div>
        <section class="coming-card">
            <div class="brand-mark">
                <img src="assets/img/white-logo.png" alt="Opulent Influencer House">
            </div>
            <span class="eyebrow">Coming Soon</span>
            <h1>Opulent Influencer House is coming soon.</h1>
            <p class="subcopy">Something big is being prepared.</p>
            <button class="trigger" type="button" id="contactToggle">Contact Us</button>

            <div class="contact-wrap" id="contactWrap">
                <div class="contact-inner">
                    <form class="contact-form" id="comingContactForm" action="#" method="post">
                        <div class="field">
                            <label for="coming-name">Name</label>
                            <input id="coming-name" name="name" type="text" placeholder="Your name">
                        </div>
                        <div class="field">
                            <label for="coming-email">Email</label>
                            <input id="coming-email" name="email" type="email" placeholder="Your email">
                        </div>
                        <div class="field">
                            <label for="coming-message">Message</label>
                            <textarea id="coming-message" name="message" placeholder="Your message"></textarea>
                        </div>
                        <div class="submit-row">
                            <button class="submit-btn" type="submit">Send</button>
                        </div>
                        <div class="form-status" id="formStatus" aria-live="polite"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var toggle = document.getElementById('contactToggle');
            var wrap = document.getElementById('contactWrap');
            var form = document.getElementById('comingContactForm');
            var status = document.getElementById('formStatus');
            var firstInput = document.getElementById('coming-name');
            var isOpen = false;

            function setStatus(message, type) {
                if (!status) return;
                status.textContent = message;
                status.className = 'form-status is-visible ' + (type === 'success' ? 'is-success' : 'is-error');
            }

            function setOpen(nextOpen) {
                isOpen = nextOpen;
                wrap.classList.toggle('is-open', isOpen);
                toggle.textContent = isOpen ? 'Close Form' : 'Contact Us';
                if (isOpen && firstInput) {
                    window.setTimeout(function () {
                        firstInput.focus();
                    }, 260);
                }
            }

            if (toggle) {
                toggle.addEventListener('click', function () {
                    setOpen(!isOpen);
                });
            }

            if (form) {
                form.addEventListener('submit', function (event) {
                    event.preventDefault();

                    var submitButton = form.querySelector('.submit-btn');
                    var formData = new FormData(form);
                    var payload = {
                        name: formData.get('name'),
                        email: formData.get('email'),
                        message: formData.get('message'),
                        source: 'Coming Soon Page'
                    };

                    if (submitButton) {
                        submitButton.disabled = true;
                        submitButton.textContent = 'Sending...';
                    }

                    if (status) {
                        status.className = 'form-status';
                        status.textContent = '';
                    }

                    fetch('email.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(function (response) {
                        return response.json().catch(function () {
                            return { success: false, error: 'Unexpected server response.' };
                        });
                    })
                    .then(function (result) {
                        if (!result || !result.success) {
                            throw new Error(result && result.error ? result.error : 'Message could not be sent.');
                        }
                        form.reset();
                        setStatus('Your enquiry has been sent to contact@opulentinfluencershouse.com.', 'success');
                    })
                    .catch(function (error) {
                        setStatus(error.message || 'Message could not be sent.', 'error');
                    })
                    .finally(function () {
                        if (submitButton) {
                            submitButton.disabled = false;
                            submitButton.textContent = 'Send';
                        }
                    });
                });
            }
        })();
    </script>
</body>
</html>
